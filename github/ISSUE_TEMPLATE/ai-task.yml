name: "AI 구현 작업 (AI Implementation Task)"
description: "AI 에이전트에게 위임할 구현 단위 작업. 세션 1개에서 끝나는 크기로 쪼갤 것."
title: "[Task] "
labels: ["ai-task"]
# 이슈 타입은 organization 리포 전용 — 개인 리포에서는 무시됨.
# 담당자는 폼에서 동적 지정이 불가하므로(고정 로그인만 가능) 등록 후 직접 할당하거나 /spec 경로를 사용.
type: "Task"
body:
  - type: textarea
    id: goal
    attributes:
      label: "목표 (Goal)"
      description: "왜 하는지 한 문단. 구현 중 판단이 갈릴 때 이 문단이 기준이 된다."
      placeholder: "예: 토큰 만료 시 사용자가 재로그인 없이 세션을 이어가도록 refresh 토큰 갱신 로직을 추가한다."
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: "하지 말 것 (Non-goals)"
      description: "이번 작업 범위가 아닌 것, 건드리면 안 되는 파일/모듈. scope creep 방지의 핵심."
      placeholder: |
        - 기존 로그인 플로우 리팩토링 금지
        - src/legacy/ 이하 수정 금지
        - 에러 페이지 UI 변경은 이번 범위 아님
    validations:
      required: true

  - type: textarea
    id: anchors
    attributes:
      label: "코드 앵커 (Code Anchors)"
      description: "수정/참조할 정확한 위치. 파일 경로 + 함수명 + 가능하면 라인. '~근처에' 같은 표현 금지."
      placeholder: |
        - 수정: src/api/auth.py:42 `refresh_token()`
        - 참조: src/models/session.py `Session` 모델
        - 테스트 추가: tests/test_auth.py
    validations:
      required: true

  - type: textarea
    id: interface
    attributes:
      label: "인터페이스 계약 (Interface Contract)"
      description: "API 시그니처, 타입, 요청/응답 스키마를 산문이 아니라 코드/JSON으로 명시."
      placeholder: |
        def refresh_token(refresh: str) -> TokenPair:
            """만료 5분 전부터 갱신 허용. 유효하지 않으면 AuthError(401)."""

        POST /api/auth/refresh
        -> 200 {"access": "...", "refresh": "...", "expires_in": 3600}
        -> 401 {"error": "invalid_refresh_token"}

  - type: textarea
    id: acceptance
    attributes:
      label: "완료 기준 + 검증 명령어 (Acceptance Criteria)"
      description: "AI가 스스로 실행해서 통과를 확인할 수 있는 구체적 명령어. '잘 동작해야 함' 금지."
      placeholder: |
        - [ ] `pytest tests/test_auth.py -k refresh` 전부 통과
        - [ ] 만료된 refresh 토큰으로 요청 시 401 반환
        - [ ] 기존 테스트 전체 통과: `pytest`
    validations:
      required: true

  - type: textarea
    id: edge-cases
    attributes:
      label: "엣지 케이스 (Edge Cases)"
      description: "설계 단계에서 이미 결정한 예외 상황 처리. 안 쓰면 AI가 임의로 정한다."
      placeholder: |
        - refresh 토큰이 이미 사용된 경우 -> 재사용 감지, 세션 전체 무효화
        - 동시에 두 요청이 갱신 시도 -> 먼저 온 것만 성공, 나머지는 새 토큰 반환

  - type: textarea
    id: dependencies
    attributes:
      label: "의존성 (Dependencies)"
      description: "선행 이슈, 관련 설계문서 링크."
      placeholder: |
        - 선행: #12 (머지 후 시작)
        - 설계문서: docs/design/auth-refresh.md
